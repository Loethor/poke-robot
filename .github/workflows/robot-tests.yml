name: Robot Framework Tests (uv)

on:
  push:
    paths:
      - "tests/**"
      - "libraries/**"
      - "resources/**"
      - "pyproject.toml"
      - "uv.lock"

  pull_request:
    paths:
      - "tests/**"
      - "libraries/**"
      - "resources/**"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # -------------------
      # Checkout
      # -------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------
      # Install uv
      # -------------------
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # -------------------
      # Cache uv
      # -------------------
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      # -------------------
      # Install dependencies
      # -------------------
      - name: Install dependencies (uv sync)
        run: uv sync

      # -------------------
      # Run Robot tests with Allure listener
      # -------------------
      - name: Run tests
        run: uv run robot --listener allure_robotframework -d results tests/

      # -------------------
      # Set up Java (required for Allure CLI)
      # -------------------
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # -------------------
      # Install Allure CLI
      # -------------------
      - name: Install Allure CLI
        run: |
          curl -o allure.zip -L https://github.com/allure-framework/allure2/releases/latest/download/allure-2.41.0.zip
          unzip allure.zip -d $HOME/allure
          echo "$HOME/allure/allure-2.41.0/bin" >> $GITHUB_PATH

      # -------------------
      # Generate Allure report
      # -------------------
      - name: Generate Allure report
        run: allure generate results -o allure-report --clean

      # -------------------
      # Upload raw Robot output (debugging)
      # -------------------
      - name: Upload Robot reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-reports
          path: results/

      # -------------------
      # Prepare GitHub Pages
      # -------------------
      - name: Prepare Pages
        if: always()
        run: |
          mkdir -p public

          # Main report (Allure)
          cp -r allure-report/. public/

      # -------------------
      # Deploy to GitHub Pages
      # -------------------
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public